document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

low: 0 1px 3px rgba(124,58,237,.18), 0 8px 24px rgba(124,58,237,.14);\n    --scroll: #cfcdc4;\n  }\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  @keyframes al-spin { to { transform: rotate(360deg); } }\n  @keyframes al-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }\n  @keyframes al-pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }\n  @keyframes al-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }\n  @keyframes al-ring { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 45%, transparent); } 100% { box-shadow: 0 0 0 7px color-mix(in srgb, var(--accent) 0%, transparent); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div data-theme=\"{{ theme }}\" style=\"height:100vh; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Public Sans',system-ui,sans-serif; -webkit-font-smoothing:antialiased; display:grid; grid-template-columns:250px minmax(0,1fr) 408px;\">\n\n  <!-- ===================== SIDEBAR ===================== -->\n  <aside style=\"border-right:1px solid var(--border); background:var(--panel-2); display:flex; flex-direction:column; overflow-y:auto;\">\n    <div style=\"padding:20px 18px 16px; display:flex; align-items:center; gap:11px;\">\n      <div style=\"width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:var(--glow); display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Spectral',serif; font-weight:600; font-size:17px;\">A<\u002Fdiv>\n      <div style=\"line-height:1.1;\">\n        <div style=\"font-family:'Spectral',serif; font-size:17px; font-weight:600; letter-spacing:.01em;\">ALOFT<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.18em; color:var(--faint); text-transform:uppercase; margin-top:2px;\">Spinor Labs · Agent Lab<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:6px 12px; display:flex; flex-direction:column; gap:20px; flex:1;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); padding:0 8px 8px;\">Workspace<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:2px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"width:6px; height:6px; border-radius:2px; background:var(--faint);\"><\u002Fspan>Home<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"width:6px; height:6px; border-radius:2px; background:var(--faint);\"><\u002Fspan>Inspector<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; background:color-mix(in srgb,var(--accent) 15%, transparent); color:var(--text); font-size:13.5px; font-weight:600; box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 32%,transparent);\"><span style=\"width:6px; height:6px; border-radius:2px; background:var(--accent); box-shadow:0 0 8px var(--accent);\"><\u002Fspan>Teach<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"width:6px; height:6px; border-radius:2px; background:var(--faint);\"><\u002Fspan>Runs<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); padding:0 8px 8px;\">Memory<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:2px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:var(--accent);\"><\u002Fspan>Active Memories<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--faint);\">218<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:var(--faint);\"><\u002Fspan>Core Rules<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--faint);\">37<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:var(--faint);\"><\u002Fspan>Learnings<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--faint);\">9<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); padding:0 8px 8px;\">Data Estate<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:2px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"width:6px; height:6px; border-radius:2px; background:var(--faint);\"><\u002Fspan>Vessel Registry<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"width:6px; height:6px; border-radius:2px; background:var(--faint);\"><\u002Fspan>Owners &amp; Flags<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:9px; color:var(--dim); font-size:13.5px;\"><span style=\"width:6px; height:6px; border-radius:2px; background:var(--faint);\"><\u002Fspan>Regulatory · EEXI<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- footer: user + theme toggle -->\n    <div style=\"border-top:1px solid var(--border); padding:14px 14px 16px; display:flex; flex-direction:column; gap:14px;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <div style=\"width:32px; height:32px; border-radius:50%; background:var(--panel-3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--dim);\">KM<\u002Fdiv>\n        <div style=\"line-height:1.15; min-width:0;\">\n          <div style=\"font-size:13px; font-weight:600; white-space:nowrap;\">Karthik Menon<\u002Fdiv>\n          <div style=\"display:inline-flex; align-items:center; gap:5px; margin-top:3px; padding:2px 7px; border-radius:20px; background:color-mix(in srgb,var(--accent) 15%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent);\">\n            <span style=\"width:5px; height:5px; border-radius:50%; background:var(--accent);\"><\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent);\">Platform Admin<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ toggleTheme }}\" style=\"all:unset; cursor:pointer; display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-radius:11px; background:var(--panel); border:1px solid var(--border);\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint);\">{{ themeLabel }}<\u002Fspan>\n        <span style=\"position:relative; width:44px; height:24px; border-radius:20px; background:var(--panel-3); box-shadow:inset 0 0 0 1px var(--border); display:inline-block;\">\n          <span style=\"position:absolute; top:2px; width:18px; height:18px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 0 10px color-mix(in srgb,var(--accent) 60%,transparent); transition:left .22s cubic-bezier(.4,.1,.2,1); {{ knobStyle }}\"><\u002Fspan>\n        <\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ===================== MAIN COLUMN ===================== -->\n  <main style=\"overflow-y:auto; position:relative; display:flex; flex-direction:column;\">\n\n    <!-- Empty state -->\n    <sc-if value=\"{{ isEmpty }}\">\n      <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 48px; text-align:center; animation:al-up .4s ease;\">\n        <div style=\"width:56px; height:56px; border-radius:16px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:var(--glow); display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Spectral',serif; font-weight:600; font-size:26px; margin-bottom:26px;\">M<\u002Fdiv>\n        <div style=\"display:inline-flex; align-items:center; gap:7px; padding:5px 12px; border-radius:20px; background:color-mix(in srgb,var(--accent) 14%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent); margin-bottom:22px;\">\n          <span style=\"width:6px; height:6px; border-radius:50%; background:var(--accent); animation:al-pulse 1.8s ease-in-out infinite;\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent);\">Reflect Mode · Marcus is listening<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Spectral',serif; font-weight:400; font-size:40px; line-height:1.12; margin:0 0 14px; max-width:600px; letter-spacing:-.01em;\">What should Marcus <span style=\"font-style:italic; color:var(--accent);\">understand<\u002Fspan> today?<\u002Fh1>\n        <p style=\"font-size:15.5px; color:var(--dim); max-width:440px; margin:0 0 30px; line-height:1.6;\">Teach him a definition, a convention, or a piece of vocabulary. He'll ask questions, check the estate, and write down what he learns.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:10px; width:100%; max-width:520px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); text-align:left; margin-bottom:2px;\">Try starting with<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ setSession }}\" style=\"all:unset; cursor:pointer; text-align:left; padding:14px 16px; border-radius:12px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); font-family:'Spectral',serif; font-style:italic; font-size:16px;\" style-hover=\"border-color:color-mix(in srgb,var(--accent) 45%,transparent);\">\"Here's what actually counts as 'the fleet'.\"<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ setSession }}\" style=\"all:unset; cursor:pointer; text-align:left; padding:14px 16px; border-radius:12px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); font-family:'Spectral',serif; font-style:italic; font-size:16px;\" style-hover=\"border-color:color-mix(in srgb,var(--accent) 45%,transparent);\">\"Let me explain how we define EEXI.\"<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ setSession }}\" style=\"all:unset; cursor:pointer; text-align:left; padding:14px 16px; border-radius:12px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); font-family:'Spectral',serif; font-style:italic; font-size:16px;\" style-hover=\"border-color:color-mix(in srgb,var(--accent) 45%,transparent);\">\"'Spar' is an owner, not a ship class.\"<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Workspace (session / verifying / conflict) -->\n    <sc-if value=\"{{ showWorkspace }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; flex-direction:column; min-height:100%;\">\n\n        <!-- session header -->\n        <div style=\"position:sticky; top:0; z-index:10; background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:16px 28px 14px;\">\n          <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:wrap;\">\n            <div style=\"min-width:0;\">\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\">\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint);\">Teach Session<\u002Fspan>\n                <span style=\"display:inline-flex; align-items:center; gap:6px; padding:3px 9px; border-radius:20px; background:color-mix(in srgb,var(--accent) 14%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 32%,transparent);\">\n                  <span style=\"width:6px; height:6px; border-radius:50%; background:var(--accent); animation:al-pulse 1.8s ease-in-out infinite;\"><\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--accent);\">Reflect · Learning, not executing<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fdiv>\n              <h1 style=\"font-family:'Spectral',serif; font-weight:500; font-size:25px; margin:0; letter-spacing:-.01em;\">What counts as <span style=\"font-style:italic;\">\"the fleet\"<\u002Fspan><\u002Fh1>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:8px;\">\n              <div style=\"text-align:center; padding:7px 14px; border-radius:11px; background:var(--panel); border:1px solid var(--border); min-width:64px;\">\n                <div style=\"font-family:'Spectral',serif; font-size:22px; font-weight:600; color:var(--blue); line-height:1;\">{{ cP }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-top:5px;\">Proposed<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:center; padding:7px 14px; border-radius:11px; background:var(--panel); border:1px solid var(--border); min-width:64px;\">\n                <div style=\"font-family:'Spectral',serif; font-size:22px; font-weight:600; color:var(--green); line-height:1;\">{{ cV }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-top:5px;\">Verified<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:center; padding:7px 14px; border-radius:11px; background:var(--panel); border:1px solid var(--border); min-width:64px;\">\n                <div style=\"font-family:'Spectral',serif; font-size:22px; font-weight:600; color:var(--dim); line-height:1;\">{{ cPend }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-top:5px;\">Pending<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:center; padding:7px 14px; border-radius:11px; background:var(--panel); border:1px solid var(--border); min-width:64px;\">\n                <div style=\"font-family:'Spectral',serif; font-size:22px; font-weight:600; color:var(--amber); line-height:1;\">{{ cC }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-top:5px;\">Conflicts<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- thread -->\n        <div style=\"flex:1; padding:26px 28px 120px; display:flex; flex-direction:column; gap:22px; max-width:800px; width:100%;\">\n\n          <!-- USER msg 1 -->\n          <div style=\"display:flex; gap:12px; align-items:flex-start; justify-content:flex-end;\">\n            <div style=\"max-width:560px; background:var(--panel-3); border:1px solid var(--border-soft); border-radius:15px 15px 4px 15px; padding:13px 16px;\">\n              <p style=\"margin:0; font-size:14.5px; line-height:1.6;\">Let's pin down \"the fleet.\" When we report fleet size, I want it to mean the vessels we actually manage — not everything we have a stake in.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"width:30px; height:30px; border-radius:50%; background:var(--panel-3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--dim); flex-shrink:0;\">KM<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- MARCUS msg 2: clarifying -->\n          <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n            <div style=\"width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Spectral',serif; font-weight:600; font-size:15px; flex-shrink:0; box-shadow:var(--glow);\">M<\u002Fdiv>\n            <div style=\"max-width:600px; background:var(--panel); border:1px solid var(--border); border-radius:15px 15px 15px 4px; padding:14px 17px; box-shadow:var(--shadow);\">\n              <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:9px;\">\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim);\">Marcus<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.11em; text-transform:uppercase; color:var(--accent);\">· Follow-up question<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:0 0 10px; font-family:'Spectral',serif; font-style:italic; font-size:17px; line-height:1.5; color:var(--text);\">When you say \"fleet\" — does that include vessels we've chartered <span style=\"text-decoration:underline; text-decoration-color:color-mix(in srgb,var(--accent) 60%,transparent); text-underline-offset:3px;\">out<\u002Fspan> to third parties?<\u002Fp>\n              <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--dim);\">And should bareboat charters be treated differently from time charters? I want to record the boundary precisely.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- USER msg 3 -->\n          <div style=\"display:flex; gap:12px; align-items:flex-start; justify-content:flex-end;\">\n            <div style=\"max-width:560px; background:var(--panel-3); border:1px solid var(--border-soft); border-radius:15px 15px 4px 15px; padding:13px 16px;\">\n              <p style=\"margin:0; font-size:14.5px; line-height:1.6;\">Good question. Exclude chartered-out vessels entirely. Fleet = vessels under our management, any flag — so yes, include the Indian-flag ones. And \"Spar\" is one of our owners, by the way, not a vessel class.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"width:30px; height:30px; border-radius:50%; background:var(--panel-3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--dim); flex-shrink:0;\">KM<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- MARCUS msg 4: recall + verification -->\n          <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n            <div style=\"width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Spectral',serif; font-weight:600; font-size:15px; flex-shrink:0; box-shadow:var(--glow);\">M<\u002Fdiv>\n            <div style=\"max-width:600px; background:var(--panel); border:1px solid var(--border); border-radius:15px 15px 15px 4px; padding:14px 17px; box-shadow:var(--shadow);\">\n              <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:9px;\">\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim);\">Marcus<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:0 0 11px; font-size:14.5px; line-height:1.62;\">Noted — I've written that down as an <strong style=\"font-weight:600;\">enterprise convention<\u002Fstrong>. One thing: it <span style=\"color:var(--amber); font-weight:600;\">contradicts a memory I already hold<\u002Fspan>, so I've flagged it for you on the right. I also checked the registry to confirm the Spar detail:<\u002Fp>\n\n              <!-- verification chip inline -->\n              <div style=\"display:inline-flex; align-items:center; gap:9px; padding:8px 12px; border-radius:10px; background:color-mix(in srgb,var(--green) 13%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--green) 34%,transparent); margin-bottom:12px;\">\n                <span style=\"width:16px; height:16px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800;\">✓<\u002Fspan>\n                <span style=\"font-size:12.5px; color:var(--text);\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--green);\">Checked against the data estate<\u002Fspan><br>confirmed: <strong>41 Spar-owned vessels<\u002Fstrong> in <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px;\">owners.owner_name<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n\n              <!-- recall affordance -->\n              <div style=\"border-top:1px solid var(--border-soft); padding-top:11px;\">\n                <button sc-camel-on-click=\"{{ toggleRecall }}\" style=\"all:unset; cursor:pointer; display:inline-flex; align-items:center; gap:7px;\">\n                  <span style=\"width:14px; height:14px; border-radius:50%; box-shadow:inset 0 0 0 1.5px var(--accent); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:9px;\">↻<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent);\">Recalled 2 related memories<\u002Fspan>\n                  <span style=\"color:var(--faint); font-size:11px;\">{{ recallCaret }}<\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ recall }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:11px; animation:al-up .25s ease;\">\n                    <div style=\"display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; background:var(--panel-2); border:1px solid var(--border-soft);\">\n                      <span style=\"width:6px; height:6px; border-radius:50%; background:var(--amber); margin-top:5px; flex-shrink:0;\"><\u002Fspan>\n                      <div><div style=\"font-size:13px; line-height:1.45;\">\"Fleet <strong>includes<\u002Fstrong> chartered-out vessels for capacity reporting.\"<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--faint); margin-top:4px;\">Core Rule · added Nov 2024 · A. Rao · <span style=\"color:var(--amber);\">now conflicting<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; background:var(--panel-2); border:1px solid var(--border-soft);\">\n                      <span style=\"width:6px; height:6px; border-radius:50%; background:var(--green); margin-top:5px; flex-shrink:0;\"><\u002Fspan>\n                      <div><div style=\"font-size:13px; line-height:1.45;\">\"Managed vessels span 6 flags, incl. Liberian &amp; Indian.\"<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--faint); margin-top:4px;\">Memory · verified · Mar 2025<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- verifying moment -->\n          <sc-if value=\"{{ isVerifying }}\">\n            <div style=\"display:flex; gap:12px; align-items:flex-start; animation:al-up .3s ease;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Spectral',serif; font-weight:600; font-size:15px; flex-shrink:0; box-shadow:var(--glow);\">M<\u002Fdiv>\n              <div style=\"max-width:600px; background:var(--panel); border:1px solid var(--border); border-radius:15px 15px 15px 4px; padding:14px 17px; box-shadow:var(--shadow); width:100%;\">\n                <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:10px;\">\n                  <span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim);\">Marcus<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.11em; text-transform:uppercase; color:var(--blue);\">· Verifying a claim<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"margin:0 0 12px; font-size:14.5px; line-height:1.6;\">Let me confirm that against the registry before I write it down — checking how many vessels are actually flagged Indian and under management.<\u002Fp>\n\n                <sc-if value=\"{{ verifyIdle }}\">\n                  <button sc-camel-on-click=\"{{ runVerify }}\" style=\"all:unset; cursor:pointer; display:inline-flex; align-items:center; gap:9px; padding:9px 15px; border-radius:10px; background:var(--accent); color:#fff; box-shadow:var(--glow);\">\n                    <span style=\"width:7px; height:7px; border-radius:50%; background:#fff;\"><\u002Fspan>\n                    <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:600;\">Run verification<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ verifying }}\">\n                  <div>\n                    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:11px;\">\n                      <span style=\"width:15px; height:15px; border-radius:50%; border:2px solid color-mix(in srgb,var(--accent) 30%,transparent); border-top-color:var(--accent); animation:al-spin .7s linear infinite; display:inline-block;\"><\u002Fspan>\n                      <span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.06em; color:var(--dim);\">querying vessel_registry …<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"height:6px; border-radius:6px; overflow:hidden; background:var(--panel-3); background-image:linear-gradient(90deg, transparent 0%, color-mix(in srgb,var(--accent) 65%,transparent) 50%, transparent 100%); background-size:200% 100%; animation:al-shimmer 1.15s linear infinite;\"><\u002Fdiv>\n                    <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--faint); margin-top:8px;\">SELECT count(*) FROM vessel_registry WHERE flag_state='IN' AND status='under_management'<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ verifyDone }}\">\n                  <div style=\"display:inline-flex; align-items:center; gap:9px; padding:8px 12px; border-radius:10px; background:color-mix(in srgb,var(--green) 13%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--green) 34%,transparent); animation:al-up .3s ease;\">\n                    <span style=\"width:16px; height:16px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800;\">✓<\u002Fspan>\n                    <span style=\"font-size:12.5px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--green);\">Confirmed<\u002Fspan><br><strong>17 Indian-flag vessels<\u002Fstrong> under management · written to learnings<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- conflict resolution panel -->\n          <sc-if value=\"{{ isConflict }}\">\n            <div style=\"animation:al-up .35s ease;\">\n              <div style=\"display:inline-flex; align-items:center; gap:7px; padding:4px 11px; border-radius:20px; background:color-mix(in srgb,var(--amber) 15%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 36%,transparent); margin-bottom:14px;\">\n                <span style=\"width:6px; height:6px; border-radius:50%; background:var(--amber);\"><\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--amber);\">Conflict with existing memory · which is correct?<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr auto 1fr; gap:0; align-items:stretch; background:var(--panel); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); overflow:hidden;\">\n                <!-- existing -->\n                <div style=\"padding:18px 18px 20px;\">\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--faint); margin-bottom:12px;\">Existing memory · Core Rule<\u002Fdiv>\n                  <p style=\"margin:0 0 14px; font-family:'Spectral',serif; font-size:19px; line-height:1.4;\">Fleet <span style=\"color:var(--amber); font-style:italic;\">includes<\u002Fspan> chartered-out vessels.<\u002Fp>\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); line-height:1.9;\">Added Nov 2024 · A. Rao<br>Referenced by 3 saved reports<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width:1px; background:var(--border); position:relative;\"><span style=\"position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:34px; height:34px; border-radius:50%; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.05em; color:var(--faint);\">VS<\u002Fspan><\u002Fdiv>\n                <!-- new -->\n                <div style=\"padding:18px 18px 20px; background:color-mix(in srgb,var(--accent) 6%,transparent);\">\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--accent); margin-bottom:12px;\">New — from Karthik, just now<\u002Fdiv>\n                  <p style=\"margin:0 0 14px; font-family:'Spectral',serif; font-size:19px; line-height:1.4;\">Fleet <span style=\"color:var(--accent); font-style:italic;\">excludes<\u002Fspan> chartered-out vessels.<\u002Fp>\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); line-height:1.9;\">Taught in this session<br>Reason: \"vessels we actually manage\"<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- resolution choices -->\n              <div style=\"display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;\">\n                <button sc-camel-on-click=\"{{ chooseNew }}\" style=\"all:unset; cursor:pointer; flex:1; min-width:160px; padding:13px 15px; border-radius:12px; background:var(--panel); box-shadow:{{ styleNew }}; transition:box-shadow .15s;\">\n                  <div style=\"font-size:13.5px; font-weight:600; margin-bottom:3px;\">Keep the new definition<\u002Fdiv>\n                  <div style=\"font-size:12px; color:var(--dim);\">Excludes chartered-out · supersede the rule<\u002Fdiv>\n                <\u002Fbutton>\n                <button sc-camel-on-click=\"{{ chooseExisting }}\" style=\"all:unset; cursor:pointer; flex:1; min-width:160px; padding:13px 15px; border-radius:12px; background:var(--panel); box-shadow:{{ styleExisting }}; transition:box-shadow .15s;\">\n                  <div style=\"font-size:13.5px; font-weight:600; margin-bottom:3px;\">Keep the existing rule<\u002Fdiv>\n                  <div style=\"font-size:12px; color:var(--dim);\">Includes chartered-out · discard new<\u002Fdiv>\n                <\u002Fbutton>\n                <button sc-camel-on-click=\"{{ chooseRule }}\" style=\"all:unset; cursor:pointer; flex:1; min-width:160px; padding:13px 15px; border-radius:12px; background:var(--panel); box-shadow:{{ styleRule }}; transition:box-shadow .15s;\">\n                  <div style=\"font-size:13.5px; font-weight:600; margin-bottom:3px;\">Both — scope by context<\u002Fdiv>\n                  <div style=\"font-size:12px; color:var(--dim);\">Excl. for size, incl. for capacity<\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ hasChoice }}\">\n                <div style=\"margin-top:14px; padding:13px 16px; border-radius:12px; background:color-mix(in srgb,var(--accent) 10%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 28%,transparent); display:flex; align-items:center; gap:11px; animation:al-up .25s ease;\">\n                  <span style=\"width:20px; height:20px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex-shrink:0;\">✓<\u002Fspan>\n                  <div style=\"font-size:13.5px; line-height:1.5;\">{{ chosenSummary }} <span style=\"color:var(--faint);\">— captured as a learning; the memory commit happens later, outside Teach.<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- composer -->\n          <div style=\"position:sticky; bottom:0; margin-top:auto; padding-top:14px; background:linear-gradient(to top, var(--bg) 60%, transparent);\">\n            <div style=\"display:flex; align-items:center; gap:11px; padding:11px 12px 11px 16px; border-radius:14px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow);\">\n              <span style=\"width:6px; height:6px; border-radius:50%; background:var(--accent); animation:al-pulse 1.8s ease-in-out infinite; flex-shrink:0;\"><\u002Fspan>\n              <div style=\"flex:1; font-size:14px; color:var(--faint);\">Teach Marcus something else about the fleet…<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.11em; text-transform:uppercase; color:var(--faint); border:1px solid var(--border); padding:3px 8px; border-radius:7px;\">Reflect<\u002Fdiv>\n              <button style=\"all:unset; cursor:pointer; width:32px; height:32px; border-radius:9px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; box-shadow:var(--glow);\">↑<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- ===================== RIGHT RAIL ===================== -->\n  <aside style=\"border-left:1px solid var(--border); background:var(--panel-2); overflow-y:auto; display:flex; flex-direction:column;\">\n    <div style=\"position:sticky; top:0; z-index:5; background:color-mix(in srgb,var(--panel-2) 90%,transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); padding:17px 18px 14px;\">\n      <div style=\"display:flex; align-items:center; gap:8px;\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 9px var(--accent);\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:var(--text); font-weight:600;\">What Marcus is learning<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:8px 0 0; font-size:11.5px; color:var(--faint); line-height:1.5;\">Live-extracted learnings from this session. Reviewable now; committed to memory later.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"padding:16px 16px 90px; display:flex; flex-direction:column; gap:12px;\">\n\n      <!-- empty rail -->\n      <sc-if value=\"{{ isEmpty }}\">\n        <div style=\"border:1px dashed var(--border); border-radius:13px; padding:26px 18px; text-align:center;\">\n          <div style=\"width:34px; height:34px; border-radius:9px; background:var(--panel-3); margin:0 auto 12px; display:flex; align-items:center; justify-content:center; color:var(--faint); font-size:15px;\">✎<\u002Fdiv>\n          <div style=\"font-size:13px; color:var(--dim); line-height:1.55;\">Nothing yet. As you teach Marcus, each learning appears here — tagged, tracked, and checked against the estate.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- verifying rail -->\n      <sc-if value=\"{{ isVerifying }}\">\n        <div style=\"border-radius:13px; background:var(--panel); border:1px solid color-mix(in srgb,var(--blue) 40%,transparent); box-shadow:var(--shadow); padding:14px; animation:al-ring 1.6s ease-out infinite;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);\">Metric definition<\u002Fspan>\n            <sc-if value=\"{{ verifyDone }}\">\n              <span style=\"display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--green);\"><span style=\"width:12px; height:12px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:800;\">✓<\u002Fspan>Verified<\u002Fspan>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ verifyNotDone }}\">\n              <span style=\"display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--blue);\"><span style=\"width:9px; height:9px; border-radius:50%; border:1.5px solid var(--blue); border-top-color:transparent; animation:al-spin .7s linear infinite; display:inline-block;\"><\u002Fspan>Verifying<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font-size:13.5px; line-height:1.5; font-weight:500; margin-bottom:10px;\">Managed fleet size = count of vessels where <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; background:var(--panel-3); padding:1px 5px; border-radius:5px;\">status = under_management<\u002Fspan><\u002Fdiv>\n          <sc-if value=\"{{ verifyNotDone }}\">\n            <div style=\"height:6px; border-radius:6px; overflow:hidden; background:var(--panel-3); background-image:linear-gradient(90deg, transparent, color-mix(in srgb,var(--blue) 70%,transparent), transparent); background-size:200% 100%; animation:al-shimmer 1.15s linear infinite;\"><\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ verifyDone }}\">\n            <div style=\"display:inline-flex; align-items:center; gap:7px; padding:6px 10px; border-radius:8px; background:color-mix(in srgb,var(--green) 13%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--green) 32%,transparent);\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--green);\">Checked · estate<\u002Fspan><span style=\"font-size:11.5px;\">confirmed · <strong>17 Indian-flag<\u002Fstrong> in scope<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"border-radius:13px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); padding:14px; opacity:.75;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-bottom:8px;\">Vocabulary<\u002Fdiv>\n          <div style=\"font-size:13.5px; line-height:1.5; font-weight:500;\">\"Spar\" is an <strong>owner<\u002Fstrong>, not a vessel class<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- session / conflict rail cards -->\n      <sc-if value=\"{{ showRailCards }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n\n          <!-- CARD A · conflict -->\n          <div style=\"border-radius:13px; background:var(--panel); box-shadow:{{ cardAShadow }}; padding:14px; animation:al-up .35s ease;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;\">\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);\">Enterprise convention<\u002Fspan>\n              <span style=\"display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:20px; background:color-mix(in srgb,var(--amber) 15%,transparent); font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--amber); font-weight:600;\"><span style=\"width:5px; height:5px; border-radius:50%; background:var(--amber);\"><\u002Fspan>Conflict<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.5; font-weight:500; margin-bottom:11px;\">\"Fleet\" <span style=\"color:var(--amber);\">excludes<\u002Fspan> chartered-out vessels<\u002Fdiv>\n            <div style=\"padding:9px 11px; border-radius:9px; background:color-mix(in srgb,var(--amber) 9%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 26%,transparent); margin-bottom:11px;\">\n              <div style=\"font-size:11.5px; color:var(--dim); line-height:1.5;\">Existing memory says the opposite — <em>includes<\u002Fem> chartered-out. Needs your call.<\u002Fdiv>\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ setConflict }}\" style=\"all:unset; cursor:pointer; display:inline-flex; align-items:center; gap:7px; padding:7px 12px; border-radius:8px; background:var(--amber); color:#fff;\">\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:600;\">Resolve conflict →<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- CARD B · verified -->\n          <div style=\"border-radius:13px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); padding:14px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;\">\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);\">Estate navigation<\u002Fspan>\n              <span style=\"display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:20px; background:color-mix(in srgb,var(--green) 14%,transparent); font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--green); font-weight:600;\"><span style=\"width:11px; height:11px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:800;\">✓<\u002Fspan>Verified<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.5; font-weight:500; margin-bottom:11px;\">A vessel's flag lives on <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; background:var(--panel-3); padding:1px 5px; border-radius:5px;\">vessel_registry.flag_state<\u002Fspan><\u002Fdiv>\n            <div style=\"display:inline-flex; align-items:center; gap:7px; padding:6px 10px; border-radius:8px; background:color-mix(in srgb,var(--green) 13%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--green) 30%,transparent);\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--green);\">Checked · estate<\u002Fspan><span style=\"font-size:11px; color:var(--dim);\">column exists · 1,204 rows<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- CARD C · verified vocab -->\n          <div style=\"border-radius:13px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); padding:14px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;\">\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);\">Vocabulary · entity<\u002Fspan>\n              <span style=\"display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:20px; background:color-mix(in srgb,var(--green) 14%,transparent); font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--green); font-weight:600;\"><span style=\"width:11px; height:11px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:800;\">✓<\u002Fspan>Verified<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.5; font-weight:500; margin-bottom:11px;\">\"Spar\" is an <strong>owner<\u002Fstrong>, not a vessel class<\u002Fdiv>\n            <div style=\"display:inline-flex; align-items:center; gap:7px; padding:6px 10px; border-radius:8px; background:color-mix(in srgb,var(--green) 13%,transparent); box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--green) 30%,transparent);\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--green);\">Checked · estate<\u002Fspan><span style=\"font-size:11px; color:var(--dim);\">confirmed · <strong>41 Spar-owned vessels<\u002Fstrong><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- CARD D · proposed -->\n          <div style=\"border-radius:13px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); padding:14px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;\">\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);\">Metric definition<\u002Fspan>\n              <span style=\"display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:20px; background:color-mix(in srgb,var(--blue) 15%,transparent); font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--blue); font-weight:600;\"><span style=\"width:5px; height:5px; border-radius:50%; background:var(--blue);\"><\u002Fspan>Proposed<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.5; font-weight:500; margin-bottom:11px;\">Managed fleet size = vessels where <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; background:var(--panel-3); padding:1px 5px; border-radius:5px;\">status = under_management<\u002Fspan>, any flag<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ setVerifying }}\" style=\"all:unset; cursor:pointer; display:inline-flex; align-items:center; gap:7px; padding:6px 11px; border-radius:8px; background:var(--panel-3); box-shadow:inset 0 0 0 1px var(--border);\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim);\">Verify against estate →<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ===================== DEMO DOCK ===================== -->\n  <div style=\"position:fixed; bottom:18px; left:calc(250px + (100vw - 250px - 408px)/2); transform:translateX(-50%); z-index:100; display:flex; align-items:center; gap:6px; padding:6px; border-radius:14px; background:color-mix(in srgb,var(--panel) 92%,transparent); backdrop-filter:blur(14px); border:1px solid var(--border); box-shadow:var(--shadow);\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); padding:0 8px 0 6px;\">State<\u002Fspan>\n    <button sc-camel-on-click=\"{{ setSession }}\" style=\"{{ tabSession }}\">Session<\u002Fbutton>\n    <button sc-camel-on-click=\"{{ setEmpty }}\" style=\"{{ tabEmpty }}\">Empty<\u002Fbutton>\n    <button sc-camel-on-click=\"{{ setVerifying }}\" style=\"{{ tabVerifying }}\">Verifying<\u002Fbutton>\n    <button sc-camel-on-click=\"{{ setConflict }}\" style=\"{{ tabConflict }}\">Conflict<\u002Fbutton>\n    <span style=\"width:1px; height:20px; background:var(--border); margin:0 3px;\"><\u002Fspan>\n    <button sc-camel-on-click=\"{{ toggleTheme }}\" style=\"all:unset; cursor:pointer; padding:7px 12px; border-radius:9px; font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim);\">{{ themeShort }}<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = { theme: 'dark', screen: 'session', recall: false, verifying: false, verifyDone: false, conflictChoice: null };\n\n  setScreen(s) { this.setState({ screen: s, verifying: false, verifyDone: false }); }\n  toggleTheme() { this.setState(st => ({ theme: st.theme === 'dark' ? 'light' : 'dark' })); }\n  runVerify() {\n    if (this.state.verifying || this.state.verifyDone) return;\n    this.setState({ verifying: true });\n    this._t = setTimeout(() => this.setState({ verifying: false, verifyDone: true }), 2400);\n  }\n  componentWillUnmount() { clearTimeout(this._t); }\n\n  renderVals() {\n    const s = this.state;\n    const isEmpty = s.screen === 'empty';\n    const isVerifying = s.screen === 'verifying';\n    const isConflict = s.screen === 'conflict';\n    const isSession = s.screen === 'session';\n\n    let cP, cV, cPend, cC;\n    if (isEmpty) { cP = 0; cV = 0; cPend = 0; cC = 0; }\n    else if (isVerifying) { cP = 1; cV = s.verifyDone ? 3 : 2; cPend = s.verifyDone ? 0 : 1; cC = 0; }\n    else if (isConflict) { cP = 1; cV = 2; cPend = 0; cC = 1; }\n    else { cP = 1; cV = 2; cPend = 1; cC = 1; }\n\n    const tab = active => active\n      ? \"all:unset; cursor:pointer; padding:7px 13px; border-radius:9px; font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.06em; background:var(--accent); color:#fff; box-shadow:var(--glow);\"\n      : \"all:unset; cursor:pointer; padding:7px 13px; border-radius:9px; font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.06em; color:var(--dim);\";\n\n    const choiceShadow = active => active\n      ? \"inset 0 0 0 2px var(--accent), var(--shadow)\"\n      : \"inset 0 0 0 1px var(--border), var(--shadow)\";\n\n    const summaries = {\n      new: \"You chose to supersede the rule: fleet excludes chartered-out vessels.\",\n      existing: \"You kept the existing rule: fleet includes chartered-out vessels.\",\n      rule: \"You chose to scope by context — exclude for fleet size, include for capacity.\"\n    };\n\n    return {\n      theme: s.theme,\n      themeIsDark: s.theme === 'dark',\n      themeLabel: s.theme === 'dark' ? 'Appearance · Dark' : 'Appearance · Light',\n      themeShort: s.theme === 'dark' ? '☾ Dark' : '☀ Light',\n      knobStyle: s.theme === 'dark' ? 'left:3px;' : 'left:23px;',\n\n      isEmpty, isVerifying, isConflict, isSession,\n      showWorkspace: !isEmpty,\n      showRailCards: isSession || isConflict,\n\n      recall: s.recall,\n      recallCaret: s.recall ? '▲' : '▼',\n      verifying: s.verifying,\n      verifyDone: s.verifyDone,\n      verifyIdle: !s.verifying && !s.verifyDone,\n      verifyNotDone: !s.verifyDone,\n\n      cP, cV, cPend, cC,\n\n      cardAShadow: isConflict\n        ? \"inset 0 0 0 2px color-mix(in srgb,var(--amber) 60%,transparent), var(--shadow)\"\n        : \"inset 0 0 0 1px color-mix(in srgb,var(--amber) 42%,transparent), var(--shadow)\",\n\n      hasChoice: !!s.conflictChoice,\n      chosenSummary: s.conflictChoice ? summaries[s.conflictChoice] : '',\n      styleNew: choiceShadow(s.conflictChoice === 'new'),\n      styleExisting: choiceShadow(s.conflictChoice === 'existing'),\n      styleRule: choiceShadow(s.conflictChoice === 'rule'),\n\n      tabSession: tab(isSession),\n      tabEmpty: tab(isEmpty),\n      tabVerifying: tab(isVerifying),\n      tabConflict: tab(isConflict),\n\n      setSession: () => this.setScreen('session'),\n      setEmpty: () => this.setScreen('empty'),\n      setVerifying: () => this.setScreen('verifying'),\n      setConflict: () => this.setScreen('conflict'),\n      toggleTheme: () => this.toggleTheme(),\n      toggleRecall: () => this.setState(st => ({ recall: !st.recall })),\n      runVerify: () => this.runVerify(),\n      chooseNew: () => this.setState({ conflictChoice: 'new' }),\n      chooseExisting: () => this.setState({ conflictChoice: 'existing' }),\n      chooseRule: () => this.setState({ conflictChoice: 'rule' })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
