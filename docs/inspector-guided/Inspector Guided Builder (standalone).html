document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n style=\"font-size:8px; letter-spacing:.1em; color:var(--gold); border:1px solid var(--gold-line); border-radius:4px; padding:2px 6px;\">DRAFT<\u002Fspan>\n                      <span style=\"font-size:8px; letter-spacing:.04em; color:var(--muted);\">{{ ac.fresh }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; min-height:0; margin-top:12px; position:relative;\">{{ ac.chartEl }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n\n              <!-- skeleton loading tile -->\n              <div style=\"grid-column:span 6; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:16px; min-height:220px; display:flex; flex-direction:column;\">\n                <div class=\"ig-skel\" style=\"height:14px; width:45%;\"><\u002Fdiv>\n                <div class=\"ig-skel\" style=\"height:9px; width:28%; margin-top:8px;\"><\u002Fdiv>\n                <div style=\"flex:1; display:flex; align-items:flex-end; gap:14px; margin-top:20px;\">\n                  <div class=\"ig-skel\" style=\"width:14%; height:50%;\"><\u002Fdiv>\n                  <div class=\"ig-skel\" style=\"width:14%; height:75%;\"><\u002Fdiv>\n                  <div class=\"ig-skel\" style=\"width:14%; height:35%;\"><\u002Fdiv>\n                  <div class=\"ig-skel\" style=\"width:14%; height:88%;\"><\u002Fdiv>\n                  <div class=\"ig-skel\" style=\"width:14%; height:60%;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:9px; letter-spacing:.14em; color:var(--muted); margin-top:12px;\">LOADING WIDGET…<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== MANUAL MODE ===================== -->\n      <sc-if value=\"{{ isManual }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:100%; display:grid; grid-template-columns:290px 1fr 300px; min-height:0;\">\n\n        <!-- LIBRARY -->\n        <div style=\"border-right:1px solid var(--line); background:var(--surface); display:flex; flex-direction:column; min-height:0;\">\n          <div style=\"padding:14px 16px 10px; font-size:9px; letter-spacing:.24em; color:var(--muted);\">LIBRARY<\u002Fdiv>\n          <div style=\"display:flex; gap:0; padding:0 16px;\">\n            <button type=\"button\" sc-camel-on-click=\"{{ setDefsTab }}\" style=\"{{ defsTabStyle }}\">DEFINITIONS<\u002Fbutton>\n            <button type=\"button\" sc-camel-on-click=\"{{ setChartsTab }}\" style=\"{{ chartsTabStyle }}\">CHARTS<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:12px 16px;\">\n            <div style=\"display:flex; align-items:center; gap:9px; background:var(--surface-2); border:1px solid var(--line-2); border-radius:6px; padding:8px 11px;\">\n              <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"1.8\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n              <input type=\"text\" placeholder=\"Filter definitions…\" style=\"flex:1; background:transparent; border:none; outline:none; color:var(--ink); font-family:inherit; font-size:11px;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; overflow-y:auto; min-height:0; padding:0 10px 12px;\">\n            <sc-for list=\"{{ defs }}\" as=\"d\" hint-placeholder-count=\"14\">\n              <div style=\"display:flex; align-items:center; gap:9px; padding:8px 8px; border-radius:5px; cursor:pointer;\" style-hover=\"background:var(--surface-2);\">\n                <span style=\"color:var(--muted-2); font-size:10px;\">›<\u002Fspan>\n                <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--gold)\" stroke-width=\"1.6\" style=\"flex:none;\"><path d=\"M12 2 2 7l10 5 10-5z\"><\u002Fpath><path d=\"M2 17l10 5 10-5M2 12l10 5 10-5\"><\u002Fpath><\u002Fsvg>\n                <span style=\"flex:1; font-size:11px; color:var(--ink-dim); letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ d }}<\u002Fspan>\n                <span style=\"font-size:8px; letter-spacing:.1em; color:var(--gold); border:1px solid var(--gold-line); border-radius:3px; padding:1px 5px; flex:none;\">CAND<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 12-col grid -->\n        <div style=\"overflow:auto; min-height:0; padding:18px; background:var(--canvas);\">\n          <div style=\"display:grid; grid-template-columns:repeat(12,1fr); grid-auto-rows:96px; gap:12px;\">\n            <div style=\"grid-column:span 6; grid-row:span 2; background:var(--surface); border:1px solid var(--gold-line); border-radius:9px; padding:14px; display:flex; flex-direction:column;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n                <span style=\"font-size:12px; font-weight:600; color:var(--ink);\">Accidents by root cause<\u002Fspan>\n                <span style=\"font-size:8px; letter-spacing:.1em; color:var(--gold); border:1px solid var(--gold-line); border-radius:3px; padding:2px 6px;\">SELECTED<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1; min-height:0; margin-top:10px;\">{{ chartC1 }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"grid-column:span 6; grid-row:span 2; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:14px; display:flex; flex-direction:column;\">\n              <span style=\"font-size:12px; font-weight:600; color:var(--ink);\">Inspection compliance<\u002Fspan>\n              <div style=\"flex:1; min-height:0; margin-top:10px;\">{{ chartC2 }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"grid-column:span 5; grid-row:span 2; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:14px; display:flex; flex-direction:column;\">\n              <span style=\"font-size:12px; font-weight:600; color:var(--ink);\">Crew risk by vessel type<\u002Fspan>\n              <div style=\"flex:1; min-height:0; margin-top:10px;\">{{ chartC3 }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"grid-column:span 4; grid-row:span 2; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:14px; display:flex; flex-direction:column;\">\n              <span style=\"font-size:12px; font-weight:600; color:var(--ink);\">Severity mix<\u002Fspan>\n              <div style=\"flex:1; min-height:0; margin-top:10px;\">{{ chartC4 }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"grid-column:span 3; grid-row:span 2; border:1px dashed var(--line-2); border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--muted-2); font-size:10px; letter-spacing:.1em; gap:7px;\">\n              <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>DROP WIDGET\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- WIDGET CONFIG -->\n        <div style=\"border-left:1px solid var(--line); background:var(--surface); min-height:0; overflow-y:auto;\">\n          <div style=\"padding:14px 18px; border-bottom:1px solid var(--line); font-size:9px; letter-spacing:.24em; color:var(--gold);\">WIDGET CONFIG<\u002Fdiv>\n          <div style=\"padding:16px 18px; display:flex; flex-direction:column; gap:16px;\">\n            <label style=\"display:flex; flex-direction:column; gap:5px;\">\n              <span style=\"font-size:9px; letter-spacing:.12em; color:var(--muted-2);\">TITLE<\u002Fspan>\n              <input type=\"text\" value=\"Accidents by root cause\" style=\"background:var(--surface-2); border:1px solid var(--line-2); border-radius:5px; padding:8px 10px; color:var(--ink); font-family:inherit; font-size:11px; outline:none;\">\n            <\u002Flabel>\n            <div style=\"display:flex; flex-direction:column; gap:7px;\">\n              <span style=\"font-size:9px; letter-spacing:.12em; color:var(--muted-2);\">MEASURE<\u002Fspan>\n              <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:10px; color:var(--ink-dim); background:var(--surface-2); border:1px solid var(--line-2); border-radius:5px; padding:6px 9px;\"><span style=\"font-size:8px; color:var(--gold);\">M<\u002Fspan> Accident count<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:7px;\">\n              <span style=\"font-size:9px; letter-spacing:.12em; color:var(--muted-2);\">BREAKDOWN<\u002Fspan>\n              <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:10px; color:var(--ink-dim); background:var(--surface-2); border:1px solid var(--line-2); border-radius:5px; padding:6px 9px;\"><span style=\"font-size:8px; color:var(--gold);\">D<\u002Fspan> Root cause category<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:7px;\">\n              <span style=\"font-size:9px; letter-spacing:.12em; color:var(--muted-2);\">CHART TYPE<\u002Fspan>\n              <div style=\"display:inline-flex; border:1px solid var(--line-2); border-radius:5px; overflow:hidden; width:max-content; color:var(--muted);\">\n                <span style=\"padding:7px 10px; background:var(--gold-soft); color:var(--gold);\">▤<\u002Fspan>\n                <span style=\"padding:7px 10px; border-left:1px solid var(--line-2);\">▥<\u002Fspan>\n                <span style=\"padding:7px 10px; border-left:1px solid var(--line-2);\">◠<\u002Fspan>\n                <span style=\"padding:7px 10px; border-left:1px solid var(--line-2);\">◍<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid var(--line); padding-top:14px; font-size:10px; color:var(--muted); line-height:1.5;\">\n              This dashboard is one shared state. Anything you build here appears in <button type=\"button\" sc-camel-on-click=\"{{ goGuided }}\" style=\"background:none; border:none; color:var(--gold); font-family:inherit; font-size:10px; cursor:pointer; border-bottom:1px solid var(--gold-line); padding:0;\">guided mode<\u002Fbutton> too — no work is lost when you switch.\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = { theme:'dark', mode:'guided', stage:1, drillIdx:0, sqlOpen:false, altOpen:false, resolverOpen:false, vessel:'class', preview:'ready', libTab:'definitions' };\n\n  VERM='#D55E00'; BLUE='#0072B2'; ORANGE='#E69F00'; SKY='#56B4E9'; GREEN='#009E73';\n\n  chartSpecs() {\n    return {\n      c1:{ type:'hbar', color:this.VERM, unit:'', max:150, data:[\n        {l:'Navigation error',v:142},{l:'Equipment failure',v:98},{l:'Human factors',v:76},{l:'Weather',v:54},{l:'Cargo handling',v:31} ] },\n      c2:{ type:'line', color:this.BLUE, unit:'%', max:100, data:[\n        {l:'Jan',v:71},{l:'Feb',v:74},{l:'Mar',v:69},{l:'Apr',v:78},{l:'May',v:83},{l:'Jun',v:88} ] },\n      c3:{ type:'stacked', colors:[this.BLUE,this.ORANGE], max:66, data:[\n        {l:'Tanker',a:34,b:22},{l:'Bulk',a:28,b:31},{l:'Container',a:19,b:24},{l:'Passenger',a:41,b:18} ] },\n      c4:{ type:'hbar', max:100, unit:'', data:[\n        {l:'High',v:23,c:this.VERM},{l:'Medium',v:58,c:this.ORANGE},{l:'Low',v:96,c:this.SKY} ] }\n    };\n  }\n\n  makeChart(key) {\n    const s = this.chartSpecs()[key];\n    if (!s) return null;\n    if (s.type==='line') return this.line(s);\n    if (s.type==='stacked') return this.stacked(s);\n    return this.hbar(s);\n  }\n\n  svg(kids, W, H) {\n    return React.createElement('svg', { viewBox:`0 0 ${W} ${H}`, width:'100%', height:'100%', preserveAspectRatio:'xMidYMid meet', style:{ display:'block' } }, kids);\n  }\n  txt(x,y,s,opts) { const o=opts||{}; return React.createElement('text',{ x, y, textAnchor:o.a||'start', dominantBaseline:o.b||'central', style:{ fill:o.fill||'var(--muted)', fontFamily:'IBM Plex Mono, monospace', fontSize:(o.size||11)+'px' } }, s); }\n\n  hbar(s) {\n    const W=560, H=210, padL=150, padR=48, padT=6, padB=6, gap=12;\n    const plotW=W-padL-padR, n=s.data.length, bh=(H-padT-padB-gap*(n-1))/n, k=[];\n    s.data.forEach((d,i)=>{ const y=padT+i*(bh+gap), w=Math.max(2, d.v/s.max*plotW);\n      k.push(this.txt(padL-10, y+bh/2, d.l, {a:'end', fill:'var(--ink-dim)', size:12, key:'l'+i}));\n      k.push(React.createElement('rect',{ key:'b'+i, x:padL, y, width:w, height:bh, rx:2, fill:d.c||s.color }));\n      k.push(this.txt(padL+w+8, y+bh/2, d.v+(s.unit||''), {fill:'var(--muted)', size:11, key:'v'+i}));\n    });\n    return this.svg(k, W, H);\n  }\n\n  line(s) {\n    const W=560, H=210, padL=42, padR=18, padT=16, padB=30;\n    const plotW=W-padL-padR, plotH=H-padT-padB, n=s.data.length, k=[];\n    k.push(React.createElement('line',{ key:'base', x1:padL, y1:H-padB, x2:W-padR, y2:H-padB, stroke:'var(--line)', strokeWidth:1 }));\n    k.push(this.txt(padL-8, padT, s.max+(s.unit||''), {a:'end', size:9, key:'ymax'}));\n    k.push(this.txt(padL-8, H-padB, '0', {a:'end', size:9, key:'y0'}));\n    const pts = s.data.map((d,i)=>{ const x=padL+(i/(n-1))*plotW, y=(H-padB)-(d.v/s.max)*plotH; return [x,y]; });\n    k.push(React.createElement('polyline',{ key:'ln', points:pts.map(p=>p.join(',')).join(' '), fill:'none', stroke:s.color, strokeWidth:2.5, strokeLinejoin:'round', strokeLinecap:'round' }));\n    s.data.forEach((d,i)=>{ const [x,y]=pts[i];\n      k.push(React.createElement('circle',{ key:'c'+i, cx:x, cy:y, r:3.5, fill:s.color }));\n      k.push(this.txt(x, H-padB+13, d.l, {a:'middle', size:9, key:'x'+i}));\n    });\n    return this.svg(k, W, H);\n  }\n\n  stacked(s) {\n    const W=560, H=210, padL=40, padR=16, padT=16, padB=30;\n    const plotW=W-padL-padR, plotH=H-padT-padB, n=s.data.length, groupW=plotW/n, bw=Math.min(52, groupW*0.5), k=[];\n    k.push(React.createElement('line',{ key:'base', x1:padL, y1:H-padB, x2:W-padR, y2:H-padB, stroke:'var(--line)', strokeWidth:1 }));\n    s.data.forEach((d,i)=>{ const cx=padL+groupW*i+groupW/2, x=cx-bw/2;\n      const ha=(d.a/s.max)*plotH, hb=(d.b/s.max)*plotH;\n      k.push(React.createElement('rect',{ key:'a'+i, x, y:(H-padB)-ha, width:bw, height:ha, fill:s.colors[0] }));\n      k.push(React.createElement('rect',{ key:'b'+i, x, y:(H-padB)-ha-hb, width:bw, height:hb, fill:s.colors[1] }));\n      k.push(this.txt(cx, H-padB+13, d.l, {a:'middle', size:9, key:'x'+i}));\n    });\n    return this.svg(k, W, H);\n  }\n\n  bpData() {\n    return [\n      { id:'c1', title:'Accidents by root cause', metric:'Accident count', breakdown:'by Root cause category', why:'A ranked bar chart surfaces the biggest recurring failure modes at a glance.', defined:true, icon:'hbar' },\n      { id:'c2', title:'Inspection compliance trend', metric:'Compliance rate', breakdown:'by Month', why:'A line reveals whether compliance is improving or slipping over time.', defined:true, icon:'line' },\n      { id:'c3', title:'Crew risk by vessel type', metric:'Crew risk exposure', breakdown:'by Vessel type · severity', why:'A stacked bar compares risk load across fleet segments, split by severity.', defined:true, icon:'stack' },\n      { id:'c4', title:'Accident severity mix', metric:'Accident count', breakdown:'by Severity', why:'Ranked bars keep severity readable — no many-slice pie needed.', defined:true, icon:'hbar' },\n      { id:'x1', title:'Fatality rate over time', metric:'Fatality rate', breakdown:'by Quarter', why:'Requested, but no governed definition exists — the system refuses to fabricate a metric.', defined:false, icon:'line' }\n    ];\n  }\n\n  iconEl(type) {\n    const p = { fill:'none', stroke:'currentColor', strokeWidth:1.8 };\n    if (type==='line') return React.createElement('svg',{width:20,height:20,viewBox:'0 0 24 24',...p}, React.createElement('path',{d:'M3 17l5-6 4 3 5-8 4 5'}));\n    if (type==='stack') return React.createElement('svg',{width:20,height:20,viewBox:'0 0 24 24',...p}, React.createElement('path',{d:'M6 20V10M12 20V6M18 20v-8M3 20h18'}));\n    return React.createElement('svg',{width:20,height:20,viewBox:'0 0 24 24',...p}, React.createElement('path',{d:'M4 6h12M4 12h8M4 18h15'}));\n  }\n\n  segStyle(active) {\n    return `display:inline-flex; align-items:center; gap:7px; padding:7px 13px; font-family:inherit; font-size:10px; font-weight:600; letter-spacing:.1em; cursor:pointer; border:none; background:${active?'var(--gold)':'transparent'}; color:${active?'var(--canvas)':'var(--ink-dim)'};`;\n  }\n\n  renderVals() {\n    const st = this.state;\n    const isGuided = st.mode==='guided';\n    const set = (patch)=>this.setState(patch);\n    const goStage = (n)=>this.setState({ mode:'guided', stage:n });\n\n    // stage rail\n    const stageDefs = [\n      { num:1, name:'INTENT', sub:'the question' },\n      { num:2, name:'BLUEPRINT', sub:'propose charts' },\n      { num:3, name:'DRILL-IN', sub:'refine each' },\n      { num:4, name:'ASSEMBLE', sub:'save version' }\n    ];\n    const stages = stageDefs.map(s => {\n      const active = st.stage===s.num;\n      const done = st.stage>s.num;\n      return {\n        num:s.num, name:s.name, sub:s.sub, go:()=>goStage(s.num),\n        style:`display:inline-flex; align-items:center; gap:10px; background:${active?'var(--surface-2)':'transparent'}; border:1px solid ${active?'var(--gold-line)':'transparent'}; border-radius:8px; padding:8px 14px; cursor:pointer; font-family:inherit; color:${active?'var(--gold)':(done?'var(--ink-dim)':'var(--muted)')};`,\n        numStyle:`width:20px; height:20px; border-radius:50%; display:grid; place-items:center; font-size:10px; font-weight:600; flex:none; border:1px solid ${active?'var(--gold)':'var(--line-2)'}; background:${done?'var(--gold)':'transparent'}; color:${done?'var(--canvas)':(active?'var(--gold)':'var(--muted)')};`\n      };\n    });\n\n    // blueprint rows\n    const blueprint = this.bpData().map((b,i)=>({\n      ...b,\n      undefinedMetric: !b.defined,\n      iconEl: this.iconEl(b.icon),\n      remove: ()=>{},\n      rowStyle:`display:flex; gap:14px; align-items:flex-start; background:var(--surface); border:1px solid ${b.defined?'var(--line)':'var(--bad)'}; border-radius:10px; padding:15px 16px;`,\n      iconWrap:`width:38px; height:38px; border-radius:8px; display:grid; place-items:center; flex:none; background:var(--surface-2); border:1px solid var(--line-2); color:${b.defined?'var(--gold)':'var(--bad)'};`\n    }));\n\n    // drill rail + current\n    const bp = this.bpData().filter(b=>b.defined);\n    const idx = Math.min(st.drillIdx, bp.length-1);\n    const railItems = bp.map((b,i)=>{\n      const cur = i===idx, done = i<idx;\n      return { title:b.title, status: cur?'CURRENT':(done?'DONE':'PENDING'), go:()=>this.setState({drillIdx:i}),\n        style:`display:flex; align-items:flex-start; gap:9px; background:${cur?'var(--gold-soft)':'transparent'}; border:1px solid ${cur?'var(--gold-line)':'transparent'}; border-radius:6px; padding:8px 9px; cursor:pointer; font-family:inherit; color:${cur?'var(--gold)':(done?'var(--ink-dim)':'var(--muted)')};`,\n        dotStyle:`width:8px; height:8px; border-radius:50%; margin-top:4px; flex:none; background:${done?'var(--good)':(cur?'var(--gold)':'transparent')}; border:1px solid ${done?'var(--good)':(cur?'var(--gold)':'var(--muted-2)')};` };\n    });\n    const curSpec = bp[idx];\n\n    const previewStates = [\n      { key:'ready', label:'READY' }, { key:'loading', label:'LOADING' }, { key:'error', label:'ERROR' }\n    ].map(p=>({ label:p.label, set:()=>this.setState({preview:p.key}),\n      style:`padding:5px 9px; font-family:inherit; font-size:8px; letter-spacing:.1em; cursor:pointer; border:none; border-left:1px solid var(--line-2); background:${st.preview===p.key?'var(--gold-soft)':'transparent'}; color:${st.preview===p.key?'var(--gold)':'var(--muted)'};` }));\n\n    const altCharts = [\n      { name:'Column', d:'M6 20V10M12 20V6M18 20v-9M3 20h18' },\n      { name:'Line', d:'M3 17l5-6 4 3 5-8 4 5' },\n      { name:'Table', d:'M3 5h18v14H3zM3 10h18M9 5v14' }\n    ].map(a=>({ name:a.name, icon: React.createElement('svg',{width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.6}, React.createElement('path',{d:a.d})) }));\n\n    // assembled cards\n    const spans = { c1:6, c2:6, c3:6, c4:6 };\n    const meta = {\n      c1:{ title:'Accidents by root cause', sub:'Accident count · Root cause category' },\n      c2:{ title:'Inspection compliance', sub:'Compliance rate · Month' },\n      c3:{ title:'Crew risk by vessel type', sub:'Crew risk exposure · Vessel × severity' },\n      c4:{ title:'Accident severity mix', sub:'Accident count · Severity' }\n    };\n    const assembled = ['c1','c2','c3','c4'].map(key=>({\n      title:meta[key].title, sub:meta[key].sub, fresh:'14:32', chartEl:this.makeChart(key),\n      cardStyle:`grid-column:span ${spans[key]}; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:16px; min-height:220px; display:flex; flex-direction:column;`\n    }));\n\n    const vesselLabel = st.vessel==='class' ? 'vessel class' : 'vessel category';\n    const vesselOptions = [\n      { label:'Vessel Class', meta:'Regulatory class — Tanker, Bulk, Container…', v:'class' },\n      { label:'Vessel Category', meta:'Ops category — Deep-sea, Coastal, Inland', v:'category' }\n    ].map(o=>({ label:o.label, meta:o.meta, pick:()=>this.setState({vessel:o.v, resolverOpen:false}),\n      style:`width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; background:${st.vessel===o.v?'var(--gold-soft)':'var(--surface-2)'}; border:1px solid ${st.vessel===o.v?'var(--gold-line)':'var(--line-2)'}; border-radius:6px; padding:9px 11px; margin-bottom:7px; cursor:pointer; font-family:inherit; text-align:left;` }));\n\n    const defs = ['PROCESS FLOW LOG USER','COMPANY','CREW MEMBER','ACCIDENT CAUSE ANALYSIS','ACCIDENT CONSEQUENTIAL','ACCIDENT DAMAGE & INJURY','ACCIDENT DETAILS','ACCIDENT INDIRECT CAUSE','AI DEFICIENCY DETAILS','AREA OF CONCERN','AREA OF CONCERN DETAILS','AUDIT INSPECTION TYPE','CATEGORY CONSEQUENCES','CAUSE ANALYSIS','CAUSE ANALYSIS STATISTIC','PREVENTIVE ACTIONS','RISK MANAGEMENT ACTIVITY','ROOT CAUSES IN REPORT','INSPECTION REPORT','TASK DELEGATION'];\n\n    const candBanner = 'display:flex; align-items:center; gap:12px; background:var(--gold-soft); border:1px solid var(--gold-line); border-radius:8px; padding:11px 14px; font-size:11px; color:var(--ink-dim); line-height:1.4;';\n\n    return {\n      theme: st.theme,\n      themeLabel: st.theme==='dark' ? 'DARK' : 'LIGHT',\n      sunStyle: `font-size:11px; color:var(--gold); display:${st.theme==='light'?'inline':'none'};`,\n      moonStyle: `font-size:11px; color:var(--gold); display:${st.theme==='dark'?'inline':'none'};`,\n      toggleTheme: ()=>this.setState({ theme: st.theme==='dark'?'light':'dark' }),\n      goGuided: ()=>this.setState({ mode:'guided' }),\n      goManual: ()=>this.setState({ mode:'manual' }),\n      guidedTabStyle: this.segStyle(isGuided),\n      manualTabStyle: this.segStyle(!isGuided),\n      saveStyle: 'flex:none; display:inline-flex; align-items:center; gap:7px; background:var(--gold-soft); border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:7px 16px; font-family:inherit; font-size:10px; font-weight:600; letter-spacing:.12em; cursor:pointer;',\n\n      isGuided, isManual: !isGuided,\n      isS1: isGuided && st.stage===1,\n      isS2: isGuided && st.stage===2,\n      isS3: isGuided && st.stage===3,\n      isS4: isGuided && st.stage===4,\n      stages, blueprint, candBanner,\n      goToStage2: ()=>goStage(2),\n      acceptAll: ()=>goStage(3),\n      finish: ()=>goStage(4),\n\n      // intent\n      topics: [\n        { title:'Accident root-cause patterns', desc:'Where failures concentrate across the fleet' },\n        { title:'Inspection compliance', desc:'Audit pass rates and open findings over time' },\n        { title:'Crew risk exposure', desc:'Which roles and vessels carry the most risk' },\n        { title:'Corrective action follow-through', desc:'Are preventive actions actually closing?' },\n        { title:'Area-of-concern trends', desc:'Recurring concerns by category and port' }\n      ],\n      resolverOpen: st.resolverOpen,\n      toggleResolver: ()=>this.setState({ resolverOpen: !st.resolverOpen }),\n      vesselTermLabel: vesselLabel,\n      vesselOptions,\n\n      // drill\n      railItems,\n      drillHuman: idx+1,\n      drillTitle: curSpec ? curSpec.title : '',\n      drillSubtitle: curSpec ? (curSpec.metric+' · '+curSpec.breakdown) : '',\n      chartCurrent: this.makeChart(curSpec ? curSpec.id : 'c1'),\n      stReady: st.preview==='ready',\n      stLoading: st.preview==='loading',\n      stError: st.preview==='error',\n      setReady: ()=>this.setState({ preview:'ready' }),\n      previewStates,\n      sqlOpen: st.sqlOpen, toggleSql: ()=>this.setState({ sqlOpen: !st.sqlOpen }),\n      sqlChevron: st.sqlOpen ? '▾' : '▸',\n      altOpen: st.altOpen, toggleAlt: ()=>this.setState({ altOpen: !st.altOpen }),\n      altLabel: st.altOpen ? 'HIDE ALTERNATIVES' : 'WHY THIS + ALTERNATIVES',\n      altCharts,\n      vizIcon: '▤',\n\n      // assembled\n      assembled,\n\n      // manual\n      setDefsTab: ()=>this.setState({ libTab:'definitions' }),\n      setChartsTab: ()=>this.setState({ libTab:'charts' }),\n      defsTabStyle: `padding:9px 12px; font-family:inherit; font-size:10px; letter-spacing:.1em; font-weight:600; cursor:pointer; background:transparent; border:none; border-bottom:2px solid ${st.libTab==='definitions'?'var(--gold)':'transparent'}; color:${st.libTab==='definitions'?'var(--gold)':'var(--muted)'};`,\n      chartsTabStyle: `padding:9px 12px; font-family:inherit; font-size:10px; letter-spacing:.1em; font-weight:600; cursor:pointer; background:transparent; border:none; border-bottom:2px solid ${st.libTab==='charts'?'var(--gold)':'transparent'}; color:${st.libTab==='charts'?'var(--gold)':'var(--muted)'};`,\n      defs,\n      chartC1: this.makeChart('c1'),\n      chartC2: this.makeChart('c2'),\n      chartC3: this.makeChart('c3'),\n      chartC4: this.makeChart('c4')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
